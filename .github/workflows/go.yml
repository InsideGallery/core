name: Go

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run-integration:
        description: Run integration tests that require configured external services
        required: false
        default: false
        type: boolean

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Install verification tools
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          go install github.com/boumenot/gocover-cobertura@latest
          go install github.com/vladopajic/go-test-coverage/v2@latest
      - name: Verify
        run: make ci
      - name: Bench
        run: make bench
      - name: Convert coverage artifact
        run: gocover-cobertura < coverage.out > coverage.xml
      - name: Upload Go test results
        uses: actions/upload-artifact@v4
        with:
          name: go-verification-results
          path: |
            coverage.out
            coverage.xml
            benchmarks/current.txt

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Install coverage gate
        run: go install github.com/vladopajic/go-test-coverage/v2@latest
      - name: Generate coverage profile
        run: go test -coverprofile=coverage.out -cover ./...
      - name: Enforce coverage threshold
        run: go-test-coverage --config=./.testcoverage.yml

  integration:
    name: integration
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run-integration }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run integration tests
        run: go test -tags=integration ./...
